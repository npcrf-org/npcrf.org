# npcrf.org — Hugo site configuration.
# Bilingual site: international English at the root, European Portuguese
# under /pt/. Language is auto-selected client-side from the reader's
# browser preference, with a manual EN·PT switcher (see _partials/lang-script.html).

baseURL = "https://npcrf.org/"
title = "npcrf.org"
timeZone = "UTC"
copyright = "© 2026 npcrf.org"
defaultContentLanguage = "en"

# Keep the generated HTML free of the Hugo generator meta tag.
disableHugoGeneratorInject = true

# Keep taxonomy term titles exactly as written in front matter (lowercase tags).
capitalizeListTitles = false

# Tags are written per language (Portuguese tags on .pt.md files); strip
# accents from auto-generated term paths so "história" → /pt/temas/historia/.
removePathAccents = true

[pagination]
  pagerSize = 10

[taxonomies]
  tag = "tags"

# Stable slugs come from front matter; tags publish under /topics/ (English)
# and /pt/temas/ (Portuguese, overridden per language below).
[permalinks.page]
  posts = "/posts/:slug/"
[permalinks.taxonomy]
  tags = "/topics/"
[permalinks.term]
  tags = "/topics/:slug/"

[services.rss]
  limit = 20

[markup.goldmark.renderer]
  unsafe = false

[params]
  # GoatCounter site code: the SUBDOMAIN part of https://SUBDOMAIN.goatcounter.com.
  # Leave empty to disable analytics entirely (the footer privacy note follows it).
  goatcounter = "npcrf-org"

  # Public repository URL, shown in the footer.
  repository = "https://github.com/npcrf-org/npcrf.org"

[languages.en]
  locale = "en"
  label = "English"
  weight = 1
  title = "npcrf.org"
  [languages.en.params]
    description = "Independent, non-profit publisher of fact-checked, source-backed articles on current affairs and history."

[[languages.en.menus.main]]
  name = "Archive"
  pageRef = "/archive"
  weight = 10
[[languages.en.menus.main]]
  name = "Topics"
  url = "/topics/"
  weight = 20
[[languages.en.menus.main]]
  name = "Mission"
  pageRef = "/mission"
  weight = 30
[[languages.en.menus.main]]
  name = "Methodology"
  pageRef = "/methodology"
  weight = 40
[[languages.en.menus.main]]
  name = "Search"
  pageRef = "/search"
  weight = 50
[[languages.en.menus.main]]
  name = "Contact"
  pageRef = "/contact"
  weight = 60
# Support menu entry disabled while the page is a draft (no real donation
# data yet). Restore together with content/support.md.
# [[languages.en.menus.main]]
#   name = "Support"
#   pageRef = "/support"
#   weight = 70

[languages.pt]
  locale = "pt-PT"
  label = "Português"
  weight = 2
  title = "npcrf.org"
  [languages.pt.params]
    description = "Publicação independente e sem fins lucrativos de artigos verificados e assentes em fontes, sobre temas da atualidade e temas históricos."
  [languages.pt.permalinks.page]
    posts = "/artigos/:slug/"
  [languages.pt.permalinks.taxonomy]
    tags = "/temas/"
  [languages.pt.permalinks.term]
    tags = "/temas/:slug/"

[[languages.pt.menus.main]]
  name = "Arquivo"
  pageRef = "/archive"
  weight = 10
[[languages.pt.menus.main]]
  name = "Temas"
  url = "/pt/temas/"
  weight = 20
[[languages.pt.menus.main]]
  name = "Missão"
  pageRef = "/mission"
  weight = 30
[[languages.pt.menus.main]]
  name = "Metodologia"
  pageRef = "/methodology"
  weight = 40
[[languages.pt.menus.main]]
  name = "Pesquisa"
  pageRef = "/search"
  weight = 50
[[languages.pt.menus.main]]
  name = "Contacto"
  pageRef = "/contact"
  weight = 60
