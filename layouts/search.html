{{ define "main" }}
<article>
  <h1>{{ .Title }}</h1>
  <div class="content">{{ .Content }}</div>
  <div class="search-ui" id="search">
    <pagefind-input></pagefind-input>
    <pagefind-summary></pagefind-summary>
    <pagefind-results></pagefind-results>
  </div>
  <noscript><p>{{ with site.GetPage "/archive" }}{{ printf (i18n "search_noscript") .RelPermalink | safeHTML }}{{ end }}</p></noscript>
  <link rel="stylesheet" href="{{ "pagefind/pagefind-component-ui.css" | relURL }}">
  <script src="{{ "pagefind/pagefind-component-ui.js" | relURL }}" type="module"
    onerror="document.getElementById('search').textContent={{ i18n "search_pending" }}"></script>
</article>
{{ end }}
