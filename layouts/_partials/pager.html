{{- $p := .Paginator -}}
{{- if gt $p.TotalPages 1 -}}
<nav class="pager" aria-label="Pagination">
  {{ if $p.HasPrev }}<a href="{{ $p.Prev.URL }}" rel="prev">← Newer</a>{{ else }}<span aria-hidden="true"></span>{{ end }}
  <span class="muted">Page {{ $p.PageNumber }} of {{ $p.TotalPages }}</span>
  {{ if $p.HasNext }}<a href="{{ $p.Next.URL }}" rel="next">Older →</a>{{ else }}<span aria-hidden="true"></span>{{ end }}
</nav>
{{- end -}}
