{{ define "main" }}
<article>
  <h1>{{ .Title }}</h1>
  <div class="content">{{ .Content }}</div>
  {{ range (where site.RegularPages "Section" "posts").GroupByDate "2006" }}
  <section class="archive-year">
    <h2>{{ .Key }}</h2>
    <ul class="archive-list">
      {{ range .Pages }}
      <li><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time> <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></li>
      {{ end }}
    </ul>
  </section>
  {{ end }}
</article>
{{ end }}
